<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agricola – Licznik Punktów</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=Cinzel:wght@600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --green-dark:  #2d5a3d;
            --green:       #4a7c59;
            --green-light: #6b9e78;
            --gold:        #c8a030;
            --gold-dark:   #a07820;
            --bg:          #f4f0e6;
            --surface:     #ffffff;
            --text:        #2c2417;
            --text-muted:  #7a6e5f;
            --border:      #e0d5c3;
            --red:         #c0392b;
            --shadow:      0 2px 14px rgba(44,36,23,.12);
            --r:           12px;
            --r-sm:        8px;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ══ HEADER / LOGO ══ */
        header {
            background: linear-gradient(180deg, #080b05 0%, #111508 60%, #1a200d 100%);
            text-align: center;
            padding: 18px 20px 16px;
            position: relative;
            border-bottom: 2px solid #5a3d08;
        }
        header::after {
            content: '';
            position: absolute;
            bottom: -2px; left: 10%; right: 10%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }
        header h1 {
            font-family: 'Uncial Antiqua', Georgia, serif;
            font-size: clamp(2.8rem, 10vw, 4.2rem);
            color: #b8c83a;
            -webkit-text-stroke: 2px #7a4a08;
            text-shadow:
                3px  3px  0   #5a3200,
                5px  5px  8px rgba(0,0,0,.9),
                0    0   20px rgba(170,190,30,.15);
            line-height: 1;
            letter-spacing: 4px;
        }
        header .logo-sub {
            font-family: 'Cinzel', serif;
            font-size: .72rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--gold);
            margin-top: 6px;
            opacity: .85;
        }
        header .logo-rule {
            width: 80px; height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 8px auto 4px;
        }

        /* ══ BOTTOM NAV ══ */
        .bottom-nav {
            display: flex;
            background: #111508;
            border-top: 1px solid #5a3d08;
            position: sticky; bottom: 0; z-index: 30;
        }
        .bnav-btn {
            flex: 1; padding: 11px 8px;
            border: none; background: transparent;
            color: #8a9060; font-size: .75rem; font-weight: 600;
            cursor: pointer; transition: all .18s;
            display: flex; flex-direction: column; align-items: center; gap: 3px;
            letter-spacing: .5px; text-transform: uppercase;
        }
        .bnav-btn .bnav-icon { font-size: 1.3rem; }
        .bnav-btn.active { color: var(--gold); }
        .bnav-btn:hover  { color: #b8c83a; }

        /* ══ LAYOUT ══ */
        main { max-width: 680px; margin: 0 auto; padding: 18px 14px 80px; }

        .screen { display: none; }
        .screen.active { display: block; animation: fadeUp .25s ease; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0);    }
        }

        /* ══ CARD ══ */
        .card {
            background: var(--surface);
            border-radius: var(--r); padding: 20px;
            margin-bottom: 12px;
            box-shadow: var(--shadow); border: 1px solid var(--border);
        }
        .card-title {
            font-family: 'Cinzel', serif;
            font-size: .72rem; font-weight: 700; color: var(--green-dark);
            margin-bottom: 12px; text-transform: uppercase; letter-spacing: .5px;
        }

        /* ══ BUTTONS ══ */
        .btn {
            display: flex; align-items: center; justify-content: center;
            width: 100%; padding: 13px 20px;
            border: none; border-radius: var(--r-sm);
            font-size: 1rem; font-weight: 700; cursor: pointer; transition: all .18s;
        }
        .btn-green  { background: var(--green); color: #fff; }
        .btn-green:hover  { background: var(--green-dark); transform: translateY(-1px); }
        .btn-outline { background: transparent; color: var(--green); border: 2px solid var(--green); }
        .btn-outline:hover { background: var(--green); color: #fff; }
        .btn-sm {
            padding: 7px 14px; font-size: .82rem; font-weight: 600;
            border-radius: var(--r-sm); border: none; cursor: pointer; transition: all .18s;
        }

        /* ══ SETUP ══ */
        .count-row { display: flex; gap: 8px; margin-bottom: 18px; }
        .count-btn {
            flex: 1; padding: 12px;
            border: 2px solid var(--border); border-radius: var(--r-sm);
            background: var(--surface); font-size: 1.1rem; font-weight: 700;
            cursor: pointer; color: var(--text-muted); transition: all .18s;
        }
        .count-btn.active { border-color: var(--green); background: var(--green); color: #fff; }
        .count-btn:hover:not(.active) { border-color: var(--green-light); color: var(--green); }

        .player-name-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .dot { width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0; }
        input[type="text"] {
            flex: 1; padding: 10px 14px;
            border: 2px solid var(--border); border-radius: var(--r-sm);
            font-size: 1rem; outline: none; transition: border-color .18s;
            background: var(--surface); color: var(--text);
        }
        input[type="text"]:focus { border-color: var(--green); }

        .day-title-section { margin-top: 16px; }
        .day-title-label {
            font-size: .82rem; color: var(--text-muted);
            margin-bottom: 6px; font-style: italic;
        }

        /* ══ SCORE BAR ══ */
        .score-bar {
            position: sticky; top: 0; z-index: 20;
            background: #111508; color: #fff;
            border-radius: var(--r-sm); padding: 11px 16px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,.3);
            border: 1px solid #3a4a1a;
        }
        .score-bar-name  { font-weight: 700; font-size: .98rem; color: #e0e8b0; }
        .score-bar-label { font-size: .68rem; opacity: .65; text-transform: uppercase; letter-spacing: .5px; }
        .score-bar-total { font-size: 1.7rem; font-weight: 800; color: var(--gold); }

        /* ══ TABS ══ */
        .tabs {
            display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px;
            margin-bottom: 12px; scrollbar-width: none;
        }
        .tabs::-webkit-scrollbar { display: none; }
        .tab {
            flex-shrink: 0; padding: 7px 14px;
            border: none; border-radius: 20px;
            background: var(--border); color: var(--text-muted);
            font-size: .85rem; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; gap: 6px; transition: all .18s;
        }
        .tab.active { background: var(--green); color: #fff; }
        .tab-dot { width: 9px; height: 9px; border-radius: 50%; }

        /* ══ CATEGORY ROW ══ */
        .cat-row {
            display: flex; align-items: center;
            padding: 12px 0; border-bottom: 1px solid var(--border); gap: 10px;
        }
        .cat-row:last-child { border-bottom: none; }
        .cat-icon  { font-size: 1.35rem; width: 32px; text-align: center; flex-shrink: 0; }
        .cat-info  { flex: 1; min-width: 0; }
        .cat-name  { font-weight: 600; font-size: .93rem; line-height: 1.2; }
        .cat-hint  { font-size: .7rem; color: var(--text-muted); margin-top: 2px; line-height: 1.3; }
        .cat-pts   { font-weight: 800; font-size: 1.1rem; width: 44px; text-align: right; flex-shrink: 0; }
        .cat-pts.neg  { color: var(--red); }
        .cat-pts.pos  { color: var(--green-dark); }
        .cat-pts.zero { color: var(--text-muted); }

        /* ══ COUNTER ══ */
        .counter { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
        .c-btn {
            width: 32px; height: 32px;
            border: 2px solid var(--border); border-radius: 8px;
            background: var(--surface); color: var(--text);
            font-size: 1.2rem; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all .12s; user-select: none;
        }
        .c-btn:hover  { border-color: var(--green); color: var(--green); }
        .c-btn:active { background: var(--green); color: #fff; border-color: var(--green); }
        .c-val { width: 34px; text-align: center; font-size: 1.1rem; font-weight: 700; }

        /* ══ HOUSE ══ */
        .house-extras { margin-top: 8px; display: flex; flex-direction: column; gap: 8px; }
        .house-row { display: flex; align-items: center; gap: 10px; }
        .house-row-label { font-size: .78rem; color: var(--text-muted); width: 70px; flex-shrink: 0; }
        .material-btns { display: flex; gap: 5px; }
        .mat-btn {
            flex: 1; padding: 6px 4px;
            border: 2px solid var(--border); border-radius: var(--r-sm);
            background: var(--surface); font-size: .76rem; font-weight: 600;
            cursor: pointer; text-align: center; transition: all .18s; color: var(--text-muted);
        }
        .mat-btn.active { border-color: var(--green); background: var(--green); color: #fff; }

        /* ══ NAV BUTTONS ══ */
        .nav-row { display: flex; gap: 8px; margin-top: 12px; }
        .nav-btn {
            flex: 1; padding: 12px;
            border: none; border-radius: var(--r-sm);
            font-size: .95rem; font-weight: 700; cursor: pointer; transition: all .18s;
        }
        .nav-prev   { background: var(--border); color: var(--text-muted); }
        .nav-next   { background: var(--green); color: #fff; }
        .nav-finish { background: var(--gold); color: #fff; }
        .nav-btn:hover { opacity: .88; transform: translateY(-1px); }

        /* ══ RESULTS ══ */
        .result-item {
            background: var(--surface); border: 2px solid var(--border);
            border-radius: var(--r); padding: 14px;
            display: flex; align-items: flex-start; gap: 12px;
            box-shadow: var(--shadow); margin-bottom: 10px;
        }
        .result-item.winner { border-color: var(--gold); background: linear-gradient(135deg,#fffaf0,#fff3d0); }
        .result-rank  { font-size: 1.6rem; font-weight: 900; width: 36px; text-align: center; flex-shrink: 0; line-height: 1; }
        .rank-gold   { color: #c9982d; }
        .rank-silver { color: #8c9199; }
        .rank-bronze { color: #a0665a; }
        .rank-other  { color: var(--text-muted); font-size: 1.1rem; }
        .result-name { font-weight: 700; font-size: 1rem; }
        .result-score { font-size: 1.8rem; font-weight: 900; color: var(--green-dark); margin-left: auto; flex-shrink: 0; }
        .result-label { font-size: .7rem; color: var(--text-muted); }

        .detail-btn {
            background: none; border: none; color: var(--text-muted);
            font-size: .75rem; cursor: pointer; padding: 3px 0; transition: color .18s;
        }
        .detail-btn:hover { color: var(--text); }
        .breakdown { display: none; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
        .breakdown.open { display: grid; grid-template-columns: 1fr 1fr; gap: 3px 14px; }
        .bd-row { display: flex; justify-content: space-between; font-size: .78rem; }
        .bd-label { color: var(--text-muted); }
        .bd-val { font-weight: 600; }
        .bd-val.neg { color: var(--red); }

        /* ══ STATS ══ */
        .stats-section-title {
            font-family: 'Cinzel', serif;
            font-size: .72rem; font-weight: 700;
            color: var(--green-dark); text-transform: uppercase;
            letter-spacing: .5px; margin-bottom: 12px;
            padding-bottom: 6px; border-bottom: 2px solid var(--border);
        }

        /* record card */
        .record-card {
            background: linear-gradient(135deg,#fffaf0,#fff3d0);
            border: 2px solid var(--gold); border-radius: var(--r);
            padding: 16px; margin-bottom: 12px; text-align: center;
        }
        .record-score { font-size: 2.6rem; font-weight: 900; color: var(--gold-dark); line-height: 1; }
        .record-name  { font-size: 1rem; font-weight: 700; margin-top: 4px; }
        .record-meta  { font-size: .75rem; color: var(--text-muted); margin-top: 2px; }

        /* player stats table */
        .player-stat-row {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 0; border-bottom: 1px solid var(--border);
        }
        .player-stat-row:last-child { border-bottom: none; }
        .stat-name { flex: 1; font-weight: 600; font-size: .92rem; }
        .stat-nums { display: flex; gap: 14px; flex-shrink: 0; }
        .stat-cell { text-align: center; min-width: 36px; }
        .stat-cell-val { font-weight: 700; font-size: .95rem; }
        .stat-cell-lbl { font-size: .62rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .3px; }
        .win-pct-bar {
            height: 5px; background: var(--border); border-radius: 3px;
            margin-top: 5px; overflow: hidden;
        }
        .win-pct-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width .4s; }

        /* history list */
        .history-item {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--r-sm); padding: 12px 14px;
            margin-bottom: 8px; cursor: pointer;
        }
        .history-item:hover { border-color: var(--green-light); }
        .history-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .history-title { font-weight: 700; font-size: .95rem; }
        .history-date  { font-size: .72rem; color: var(--text-muted); margin-top: 1px; }
        .history-winner { font-size: .8rem; color: var(--green-dark); margin-top: 4px; }
        .history-scores { display: none; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
        .history-scores.open { display: flex; flex-direction: column; gap: 4px; }
        .hs-row { display: flex; align-items: center; gap: 8px; font-size: .82rem; }
        .hs-rank { width: 20px; font-weight: 700; color: var(--text-muted); }
        .hs-name { flex: 1; font-weight: 600; }
        .hs-score { font-weight: 700; color: var(--green-dark); }

        .empty-state {
            text-align: center; padding: 40px 20px;
            color: var(--text-muted); font-size: .9rem;
        }
        .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 10px; }

        .clear-btn {
            background: #fdecea; color: var(--red);
            border: 1px solid #f5b7b1; padding: 8px 16px;
            border-radius: var(--r-sm); font-size: .8rem; font-weight: 600;
            cursor: pointer; transition: all .18s;
        }
        .clear-btn:hover { background: var(--red); color: #fff; }

        /* ══ MISC ══ */
        .info-pill {
            background: #e8f5ec; color: var(--green-dark);
            border-radius: 6px; padding: 8px 12px;
            font-size: .78rem; margin-bottom: 12px;
            border-left: 3px solid var(--green);
        }

        @media (max-width: 480px) {
            header h1 { font-size: 2.6rem; }
            main { padding: 12px 10px 80px; }
            .cat-name { font-size: .88rem; }
            .stat-nums { gap: 8px; }
        }
    </style>
</head>
<body>

<header>
    <h1>Agricola</h1>
    <div class="logo-rule"></div>
    <div class="logo-sub">Licznik Punktów</div>
</header>

<main>

    <!-- ══ SETUP ══ -->
    <div id="screen-setup" class="screen active">
        <div class="card">
            <div class="card-title">Liczba graczy</div>
            <div class="count-row">
                <button class="count-btn" onclick="setCount(2)">2</button>
                <button class="count-btn" onclick="setCount(3)">3</button>
                <button class="count-btn active" onclick="setCount(4)">4</button>
                <button class="count-btn" onclick="setCount(5)">5</button>
            </div>
            <div class="card-title">Imiona graczy</div>
            <div id="name-inputs"></div>

            <div class="day-title-section">
                <div class="day-title-label">Jak zatytułować dzisiejszy dzień?</div>
                <input type="text" id="day-title" placeholder="np. Sobotnia bitwa" style="width:100%">
            </div>
        </div>
        <button class="btn btn-green" onclick="startGame()">Rozpocznij grę →</button>
    </div>

    <!-- ══ SCORING ══ -->
    <div id="screen-scoring" class="screen">
        <div class="tabs" id="tabs"></div>
        <div class="score-bar">
            <div>
                <div class="score-bar-name" id="bar-name">Gracz</div>
                <div class="score-bar-label">bieżący gracz</div>
            </div>
            <div style="text-align:right">
                <div class="score-bar-label">Suma punktów</div>
                <div class="score-bar-total" id="bar-total">0</div>
            </div>
        </div>
        <div class="info-pill">Wpisz wyniki dla każdego gracza, a następnie przejdź do następnego.</div>
        <div class="card" id="scoring-card"></div>
        <div class="nav-row" id="nav-row"></div>
    </div>

    <!-- ══ RESULTS ══ -->
    <div id="screen-results" class="screen">
        <div class="card">
            <div id="results-game-title" style="font-family:'Cinzel',serif;font-size:.82rem;color:var(--text-muted);text-align:center;margin-bottom:4px"></div>
            <div style="font-size:1.2rem;font-weight:800;text-align:center;margin-bottom:16px;color:var(--green-dark)">🏆 Wyniki końcowe</div>
            <div id="results-list"></div>
        </div>
        <button class="btn btn-outline" onclick="newGame()" style="margin-bottom:8px">↩ Nowa gra</button>
    </div>

    <!-- ══ STATS ══ -->
    <div id="screen-stats" class="screen">
        <div id="stats-content"></div>
    </div>

</main>

<!-- bottom nav -->
<div class="bottom-nav">
    <button class="bnav-btn active" id="bnav-game" onclick="navTo('game')">
        <span class="bnav-icon">🌾</span>Gra
    </button>
    <button class="bnav-btn" id="bnav-stats" onclick="navTo('stats')">
        <span class="bnav-icon">📊</span>Statystyki
    </button>
</div>

<script>
/* ═══════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════ */
const COLORS = ['#e74c3c','#3498db','#27ae60','#f39c12','#8e44ad'];
const HISTORY_KEY = 'agricola_history_v1';

const calc = {
    fields:     n => n===0?-1: n===1?1: n===2?2: n===3?3: 4,
    pastures:   n => n===0?-1: n===1?1: n===2?2: n===3?3: 4,
    grain:      n => n===0?-1: n<=3?1: n<=5?2: n<=7?3: 4,
    vegetables: n => n===0?-1: n===1?1: n===2?2: n===3?3: 4,
    sheep:      n => n===0?-1: n<=3?1: n<=5?2: n<=7?3: 4,
    boar:       n => n===0?-1: n<=2?1: n<=4?2: n<=6?3: 4,
    cattle:     n => n===0?-1: n===1?1: n<=3?2: n<=5?3: 4,
};

const HOUSE_PTS = { wood: 0, clay: 1, stone: 2 };

const CATS = [
    { id:'fields',     type:'counter', icon:'🌾', name:'Pola',
      hint:'0: −1 | 1: +1 | 2: +2 | 3: +3 | 4+: +4',
      min:0, max:10, score: n => calc.fields(n) },

    { id:'pastures',   type:'counter', icon:'🌿', name:'Pastwiska',
      hint:'0: −1 | 1: +1 | 2: +2 | 3: +3 | 4+: +4',
      min:0, max:10, score: n => calc.pastures(n) },

    { id:'grain',      type:'counter', icon:'🌽', name:'Zboże',
      hint:'0: −1 | 1–3: +1 | 4–5: +2 | 6–7: +3 | 8+: +4',
      min:0, max:20, score: n => calc.grain(n) },

    { id:'vegetables', type:'counter', icon:'🥕', name:'Warzywa',
      hint:'0: −1 | 1: +1 | 2: +2 | 3: +3 | 4+: +4',
      min:0, max:10, score: n => calc.vegetables(n) },

    { id:'sheep',      type:'counter', icon:'🐑', name:'Owce',
      hint:'0: −1 | 1–3: +1 | 4–5: +2 | 6–7: +3 | 8+: +4',
      min:0, max:20, score: n => calc.sheep(n) },

    { id:'boar',       type:'counter', icon:'🐗', name:'Dziki',
      hint:'0: −1 | 1–2: +1 | 3–4: +2 | 5–6: +3 | 7+: +4',
      min:0, max:20, score: n => calc.boar(n) },

    { id:'cattle',     type:'counter', icon:'🐄', name:'Krowy',
      hint:'0: −1 | 1: +1 | 2–3: +2 | 4–5: +3 | 6+: +4',
      min:0, max:20, score: n => calc.cattle(n) },

    { id:'empty',      type:'counter', icon:'⬜', name:'Niewykorzystane obszary',
      hint:'−1 punkt za każde puste miejsce',
      min:0, max:15, score: n => -n },

    { id:'stables',    type:'counter', icon:'🏠', name:'Ogrodzone obory',
      hint:'+1 punkt za każdą ogrodzoną oborę',
      min:0, max:10, score: n => n },

    { id:'house',      type:'house',   icon:'🏡', name:'Dom' },

    { id:'family',     type:'counter', icon:'👨‍👩‍👧', name:'Członkowie rodziny',
      hint:'+3 punkty za każdą osobę',
      min:1, max:5, score: n => n * 3 },

    { id:'bonus',      type:'manual',  icon:'🃏', name:'Punkty za karty',
      hint:'Suma punktów z żółtych kółek na kartach' },

    { id:'special',    type:'manual',  icon:'⭐', name:'Punkty Specjalne',
      hint:'Dodatkowe punkty specjalne' },

    { id:'begging',    type:'counter', icon:'🙏', name:'Karty żebraniny',
      hint:'−3 punkty za każdą kartę żebraniny',
      min:0, max:10, score: n => n * -3 },
];

/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
let players = [];
let cur = 0;
let numPlayers = 4;
let currentDayTitle = '';
let currentScreen = 'setup'; // 'setup'|'scoring'|'results'|'stats'

function makePlayer(name, idx) {
    const vals = {};
    CATS.filter(c => c.type === 'counter').forEach(c => {
        vals[c.id] = c.id === 'family' ? 2 : 0;
    });
    const manuals = {};
    CATS.filter(c => c.type === 'manual').forEach(c => { manuals[c.id] = 0; });
    return { name, color: COLORS[idx], vals, houseRooms: 2, houseMat: 'wood', manuals };
}

function houseScore(p) { return p.houseRooms * HOUSE_PTS[p.houseMat]; }

function playerTotal(p) {
    return CATS.reduce((sum, c) => {
        if (c.type === 'counter') return sum + c.score(p.vals[c.id] ?? 0);
        if (c.type === 'house')   return sum + houseScore(p);
        if (c.type === 'manual')  return sum + (p.manuals[c.id] ?? 0);
        return sum;
    }, 0);
}

/* ═══════════════════════════════════════
   HISTORY / LOCALSTORAGE
═══════════════════════════════════════ */
function loadHistory() {
    try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
    catch { return []; }
}

function saveGameToHistory(title, ranked) {
    const history = loadHistory();
    history.unshift({
        id:      Date.now(),
        title:   title || 'Bez tytułu',
        date:    new Date().toLocaleDateString('pl-PL', { day:'2-digit', month:'2-digit', year:'numeric' }),
        players: ranked.map(p => ({ name: p.name, score: p.total, color: p.color }))
    });
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
}

function clearHistory() {
    if (confirm('Wyczyścić całą historię gier?')) {
        localStorage.removeItem(HISTORY_KEY);
        renderStats();
    }
}

/* ═══════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════ */
function navTo(dest) {
    document.querySelectorAll('.bnav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('bnav-' + dest).classList.add('active');

    if (dest === 'stats') {
        showScreen('stats');
        renderStats();
        currentScreen = 'stats';
    } else {
        // restore game state screen
        showScreen(currentScreen === 'stats' ? 'setup' : currentScreen);
        if (currentScreen === 'stats') currentScreen = 'setup';
    }
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + id).classList.add('active');
}

/* ═══════════════════════════════════════
   SETUP
═══════════════════════════════════════ */
function setCount(n) {
    numPlayers = n;
    document.querySelectorAll('.count-btn').forEach((b, i) => {
        b.classList.toggle('active', i + 2 === n);
    });
    renderNameInputs();
}

function renderNameInputs() {
    const presets = ['Ola','Filip','Mamson','',''];
    const c = document.getElementById('name-inputs');
    c.innerHTML = '';
    for (let i = 0; i < numPlayers; i++) {
        const val = presets[i] ?? '';
        const ph  = val || `Gracz ${i+1}`;
        const row = document.createElement('div');
        row.className = 'player-name-row';
        row.innerHTML = `
            <div class="dot" style="background:${COLORS[i]}"></div>
            <input type="text" id="pname-${i}" placeholder="${ph}" value="${val}">
        `;
        c.appendChild(row);
    }
}

function startGame() {
    players = [];
    for (let i = 0; i < numPlayers; i++) {
        const el = document.getElementById(`pname-${i}`);
        players.push(makePlayer(el.value.trim() || `Gracz ${i+1}`, i));
    }
    currentDayTitle = document.getElementById('day-title').value.trim();
    cur = 0;
    currentScreen = 'scoring';
    showScreen('scoring');
    document.getElementById('bnav-game').classList.add('active');
    document.getElementById('bnav-stats').classList.remove('active');
    renderTabs();
    renderCard();
}

/* ═══════════════════════════════════════
   SCORING
═══════════════════════════════════════ */
function renderTabs() {
    const c = document.getElementById('tabs');
    c.innerHTML = '';
    players.forEach((p, i) => {
        const t = document.createElement('button');
        t.className = 'tab' + (i === cur ? ' active' : '');
        t.innerHTML = `<span class="tab-dot" style="background:${p.color}"></span>${p.name}`;
        t.onclick = () => switchTo(i);
        c.appendChild(t);
    });
}

function switchTo(idx) {
    cur = idx;
    renderTabs();
    renderCard();
}

function renderCard() {
    const p = players[cur];
    document.getElementById('bar-name').textContent = p.name;
    updateBar();

    const card = document.getElementById('scoring-card');
    card.innerHTML = '';

    CATS.forEach(cat => {
        const row = document.createElement('div');
        row.className = 'cat-row';

        if (cat.type === 'counter') {
            const v = p.vals[cat.id] ?? 0;
            const pts = cat.score(v);
            row.innerHTML = `
                <div class="cat-icon">${cat.icon}</div>
                <div class="cat-info">
                    <div class="cat-name">${cat.name}</div>
                    <div class="cat-hint">${cat.hint}</div>
                </div>
                <div class="counter">
                    <button class="c-btn" onclick="chg('${cat.id}',-1)">−</button>
                    <div class="c-val" id="v-${cat.id}">${v}</div>
                    <button class="c-btn" onclick="chg('${cat.id}',1)">+</button>
                </div>
                <div class="cat-pts ${ptsClass(pts)}" id="p-${cat.id}">${fmt(pts)}</div>
            `;

        } else if (cat.type === 'house') {
            const hs = houseScore(p);
            row.innerHTML = `
                <div class="cat-icon">${cat.icon}</div>
                <div class="cat-info" style="flex:1">
                    <div class="cat-name">Dom</div>
                    <div class="house-extras">
                        <div class="house-row">
                            <span class="house-row-label">Izby:</span>
                            <div class="counter">
                                <button class="c-btn" onclick="chgRooms(-1)">−</button>
                                <div class="c-val" id="v-houseRooms">${p.houseRooms}</div>
                                <button class="c-btn" onclick="chgRooms(1)">+</button>
                            </div>
                        </div>
                        <div class="house-row" style="align-items:flex-start">
                            <span class="house-row-label" style="padding-top:4px">Materiał:</span>
                            <div class="material-btns">
                                <button class="mat-btn ${p.houseMat==='wood'  ?'active':''}" onclick="setMat('wood')">🪵 Drewno<br><small>0/izbę</small></button>
                                <button class="mat-btn ${p.houseMat==='clay'  ?'active':''}" onclick="setMat('clay')">🧱 Glina<br><small>+1/izbę</small></button>
                                <button class="mat-btn ${p.houseMat==='stone' ?'active':''}" onclick="setMat('stone')">🪨 Kamień<br><small>+2/izbę</small></button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="cat-pts ${ptsClass(hs)}" id="p-house">${fmt(hs)}</div>
            `;

        } else if (cat.type === 'manual') {
            const b = p.manuals[cat.id] ?? 0;
            row.innerHTML = `
                <div class="cat-icon">${cat.icon}</div>
                <div class="cat-info">
                    <div class="cat-name">${cat.name}</div>
                    <div class="cat-hint">${cat.hint}</div>
                </div>
                <div class="counter">
                    <button class="c-btn" onclick="chgManual('${cat.id}',-1)">−</button>
                    <div class="c-val" id="v-${cat.id}">${b}</div>
                    <button class="c-btn" onclick="chgManual('${cat.id}',1)">+</button>
                </div>
                <div class="cat-pts ${ptsClass(b)}" id="p-${cat.id}">${fmt(b)}</div>
            `;
        }

        card.appendChild(row);
    });

    renderNav();
}

function ptsClass(n) { return n < 0 ? 'neg' : n > 0 ? 'pos' : 'zero'; }
function fmt(n)      { return n > 0 ? '+' + n : String(n); }

function updateBar() {
    document.getElementById('bar-total').textContent = playerTotal(players[cur]);
}

function chg(id, d) {
    const p = players[cur];
    const cat = CATS.find(c => c.id === id);
    p.vals[id] = Math.max(cat.min, Math.min(cat.max, (p.vals[id] ?? 0) + d));
    const pts = cat.score(p.vals[id]);
    document.getElementById('v-' + id).textContent = p.vals[id];
    setPts('p-' + id, pts);
    updateBar();
}

function chgRooms(d) {
    const p = players[cur];
    p.houseRooms = Math.max(2, Math.min(5, p.houseRooms + d));
    document.getElementById('v-houseRooms').textContent = p.houseRooms;
    setPts('p-house', houseScore(p));
    updateBar();
}

function setMat(m) {
    players[cur].houseMat = m;
    document.querySelectorAll('.mat-btn').forEach((b, i) => {
        b.classList.toggle('active', ['wood','clay','stone'][i] === m);
    });
    setPts('p-house', houseScore(players[cur]));
    updateBar();
}

function chgManual(id, d) {
    const p = players[cur];
    p.manuals[id] = (p.manuals[id] ?? 0) + d;
    document.getElementById('v-' + id).textContent = p.manuals[id];
    setPts('p-' + id, p.manuals[id]);
    updateBar();
}

function setPts(id, pts) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = fmt(pts);
    el.className = 'cat-pts ' + ptsClass(pts);
}

function renderNav() {
    const nav = document.getElementById('nav-row');
    nav.innerHTML = '';
    if (cur > 0) {
        const b = document.createElement('button');
        b.className = 'nav-btn nav-prev';
        b.textContent = '← Poprzedni';
        b.onclick = () => switchTo(cur - 1);
        nav.appendChild(b);
    }
    if (cur < players.length - 1) {
        const b = document.createElement('button');
        b.className = 'nav-btn nav-next';
        b.textContent = 'Następny →';
        b.onclick = () => switchTo(cur + 1);
        nav.appendChild(b);
    } else {
        const b = document.createElement('button');
        b.className = 'nav-btn nav-finish';
        b.textContent = '🏆 Pokaż wyniki';
        b.onclick = showResults;
        nav.appendChild(b);
    }
}

/* ═══════════════════════════════════════
   RESULTS
═══════════════════════════════════════ */
function showResults() {
    const ranked = [...players]
        .map(p => ({ ...p, total: playerTotal(p) }))
        .sort((a, b) => b.total - a.total);

    saveGameToHistory(currentDayTitle, ranked);

    const titleEl = document.getElementById('results-game-title');
    titleEl.textContent = currentDayTitle ? `„${currentDayTitle}"` : '';

    const list = document.getElementById('results-list');
    list.innerHTML = '';

    const RC = ['rank-gold','rank-silver','rank-bronze','rank-other','rank-other'];
    const RS = ['🥇','🥈','🥉','4','5'];

    ranked.forEach((p, i) => {
        const div = document.createElement('div');
        div.className = 'result-item' + (i === 0 ? ' winner' : '');

        const bdRows = CATS.map(cat => {
            let pts, lbl;
            if (cat.type === 'counter') { pts = cat.score(p.vals[cat.id] ?? 0); lbl = cat.name; }
            else if (cat.type === 'house')  { pts = houseScore(p); lbl = 'Dom'; }
            else { pts = p.manuals[cat.id] ?? 0; lbl = cat.name; }
            return `<div class="bd-row">
                <span class="bd-label">${lbl}</span>
                <span class="bd-val ${pts<0?'neg':''}">${fmt(pts)}</span>
            </div>`;
        }).join('');

        div.innerHTML = `
            <div class="result-rank ${RC[i]}">${RS[i]}</div>
            <div style="flex:1">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px">
                    <div class="dot" style="background:${p.color}"></div>
                    <div class="result-name">${p.name}</div>
                </div>
                <div class="result-label">${p.total} pkt</div>
                <button class="detail-btn" onclick="toggleBd(this)">▼ szczegóły</button>
                <div class="breakdown">${bdRows}</div>
            </div>
            <div class="result-score">${p.total}</div>
        `;
        list.appendChild(div);
    });

    currentScreen = 'results';
    showScreen('results');
}

function toggleBd(btn) {
    const bd = btn.nextElementSibling;
    bd.classList.toggle('open');
    btn.textContent = bd.classList.contains('open') ? '▲ ukryj' : '▼ szczegóły';
}

function newGame() {
    currentScreen = 'setup';
    showScreen('setup');
    document.getElementById('day-title').value = '';
}

/* ═══════════════════════════════════════
   STATS
═══════════════════════════════════════ */
function renderStats() {
    const history = loadHistory();
    const container = document.getElementById('stats-content');

    if (history.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">📊</div>
                <div>Brak historii gier.<br>Zagraj swoją pierwszą partię!</div>
            </div>`;
        return;
    }

    // compute aggregate stats
    const pMap = {}; // name → { games, wins, totalScore, color }
    let highScore = null;

    history.forEach(game => {
        game.players.forEach((p, idx) => {
            if (!pMap[p.name]) pMap[p.name] = { games:0, wins:0, totalScore:0, color: p.color };
            pMap[p.name].games++;
            pMap[p.name].totalScore += p.score;
            if (idx === 0) pMap[p.name].wins++;
            if (!highScore || p.score > highScore.score)
                highScore = { score: p.score, name: p.name, title: game.title, date: game.date };
        });
    });

    const sortedPlayers = Object.entries(pMap)
        .sort((a, b) => (b[1].wins / b[1].games) - (a[1].wins / a[1].games));

    // record card
    let html = `
        <div class="card">
            <div class="stats-section-title">🏅 Rekord wszech czasów</div>
            <div class="record-card">
                <div class="record-score">${highScore.score} pkt</div>
                <div class="record-name">${highScore.name}</div>
                <div class="record-meta">${highScore.title} · ${highScore.date}</div>
            </div>
        </div>

        <div class="card">
            <div class="stats-section-title">🏆 Procent wygranych</div>
    `;

    sortedPlayers.forEach(([name, s]) => {
        const pct = Math.round((s.wins / s.games) * 100);
        const avg = Math.round(s.totalScore / s.games);
        html += `
            <div class="player-stat-row">
                <div class="dot" style="background:${s.color}"></div>
                <div class="stat-name">${name}</div>
                <div class="stat-nums">
                    <div class="stat-cell">
                        <div class="stat-cell-val">${s.games}</div>
                        <div class="stat-cell-lbl">gier</div>
                    </div>
                    <div class="stat-cell">
                        <div class="stat-cell-val">${s.wins}</div>
                        <div class="stat-cell-lbl">wygranych</div>
                    </div>
                    <div class="stat-cell">
                        <div class="stat-cell-val">${pct}%</div>
                        <div class="stat-cell-lbl">win%</div>
                    </div>
                    <div class="stat-cell">
                        <div class="stat-cell-val">${avg}</div>
                        <div class="stat-cell-lbl">śr. pkt</div>
                    </div>
                </div>
            </div>
            <div style="padding:2px 0 8px 30px">
                <div class="win-pct-bar"><div class="win-pct-fill" style="width:${pct}%"></div></div>
            </div>
        `;
    });

    html += `</div>`;

    // history
    html += `
        <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
                <div class="stats-section-title" style="margin-bottom:0">📅 Historia gier (${history.length})</div>
                <button class="clear-btn" onclick="clearHistory()">Wyczyść</button>
            </div>
    `;

    history.forEach((game, gi) => {
        const winner = game.players[0];
        const scoresHTML = game.players.map((p, i) => `
            <div class="hs-row">
                <div class="hs-rank">${i+1}.</div>
                <div class="dot" style="background:${p.color};width:14px;height:14px"></div>
                <div class="hs-name">${p.name}</div>
                <div class="hs-score">${p.score} pkt</div>
            </div>
        `).join('');

        html += `
            <div class="history-item" onclick="toggleHistory(this)">
                <div class="history-header">
                    <div>
                        <div class="history-title">${game.title}</div>
                        <div class="history-date">${game.date}</div>
                    </div>
                    <div style="text-align:right;font-size:.72rem;color:var(--text-muted)">▼</div>
                </div>
                <div class="history-winner">🥇 ${winner.name} · ${winner.score} pkt</div>
                <div class="history-scores">${scoresHTML}</div>
            </div>
        `;
    });

    html += `</div>`;

    container.innerHTML = html;
}

function toggleHistory(item) {
    const scores = item.querySelector('.history-scores');
    const arrow  = item.querySelector('.history-header > div:last-child');
    scores.classList.toggle('open');
    arrow.textContent = scores.classList.contains('open') ? '▲' : '▼';
}

/* ── Init ── */
setCount(4);
renderNameInputs();
</script>
</body>
</html>
